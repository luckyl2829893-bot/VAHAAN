name: VAHAAN_VAHAAN
description: VAHAAN - AI-Driven Equity-Based Traffic Enforcement
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^13.0.0
  
  # HTTP & API
  http: ^1.2.0
  
  # Storage
  shared_preferences: ^2.2.0
  
  # UI
  google_fonts: ^6.1.0
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # Icons & Animations
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  
  # Camera & Location
  image_picker: ^1.0.7
  geolocator: ^11.0.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  camera: ^0.12.0+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
